<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06000e">
<title>Dungeon Overlord V2.8.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#ffd700;--gold2:#b8860b;--red:#e82020;--red2:#7a0000;
  --blue:#00c8ff;--purple:#9b00ff;--green:#00e676;--orange:#ff8c00;
  --bg:#06000e;--card-bg:rgba(14,6,30,0.95);--card-border:rgba(255,255,255,0.07);
  --brd:rgba(255,255,255,0.08);
  --fd:'Cinzel Decorative',serif;--ft:'Cinzel',serif;--fb:'Rajdhani',sans-serif;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
html,body{margin:0;padding:0;width:100%;height:100%;background:var(--bg);font-family:var(--fb);color:#fff;overflow:hidden;overscroll-behavior:none}

/* ── SCREENS ── */
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .4s,transform .4s}
.scr.off{opacity:0;pointer-events:none;transform:scale(1.03)}
.scr-scroll{justify-content:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scr-scroll::-webkit-scrollbar{display:none}

/* ── PRELOADER ── */
#pre{z-index:999;background:#000;overflow:hidden}
#pre .pbg{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.5) 0%,rgba(6,0,18,.85) 60%,#06000e 100%),url('https://images.unsplash.com/photo-1578662996442-48f60103fc96?q=80&w=1080&auto=format&fit=crop') center/cover no-repeat;animation:bgB 8s ease-in-out infinite}
@keyframes bgB{0%,100%{filter:brightness(.8) saturate(1.1)}50%{filter:brightness(1.1) saturate(1.4)}}
.emb{position:absolute;border-radius:50%;pointer-events:none;animation:rE linear infinite}
@keyframes rE{0%{transform:translateY(110vh) translateX(0) scale(1);opacity:1}100%{transform:translateY(-30px) translateX(var(--d)) scale(.15);opacity:0}}
#pre .pc{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:24px;text-align:center}
.psw{font-size:clamp(3rem,8vw,5rem);animation:swH 3s ease-in-out infinite;margin-bottom:14px;filter:drop-shadow(0 0 22px rgba(255,160,0,.6))}
@keyframes swH{0%,100%{transform:rotate(-10deg) scale(1)}50%{transform:rotate(10deg) scale(1.1)}}
.plo{font-family:var(--fd);font-size:clamp(1.3rem,4.5vw,2.4rem);color:var(--gold);letter-spacing:2px;animation:loF 2.5s ease-in-out infinite alternate}
@keyframes loF{from{text-shadow:0 0 15px rgba(255,180,0,.4)}to{text-shadow:0 0 50px rgba(255,180,0,.9),0 0 90px rgba(255,80,0,.5)}}
.pve{font-family:var(--ft);font-size:.65rem;color:rgba(255,215,0,.3);letter-spacing:5px;margin:4px 0 24px}
.ppc{font-family:var(--ft);font-size:1.1rem;color:var(--gold);margin-bottom:6px}
.ptr{width:min(280px,76vw);height:6px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;border:1px solid rgba(255,215,0,.1)}
.pfi{height:100%;width:0;background:linear-gradient(90deg,#880000,#ff5500,#ffd700);border-radius:4px;transition:width .22s ease;box-shadow:0 0 12px rgba(255,100,0,.6)}
.pmg{font-size:.68rem;color:rgba(255,255,255,.3);letter-spacing:1.5px;margin-top:8px;min-height:1.2em}
.pti{margin-top:18px;width:min(270px,78vw);background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.1);border-radius:10px;padding:10px 14px;font-size:.72rem;color:rgba(255,215,0,.5);line-height:1.55;text-align:center}
.pde{position:absolute;bottom:calc(var(--sb)+12px);font-size:.55rem;color:rgba(255,255,255,.08);letter-spacing:2px;font-family:var(--ft)}

/* ── AUTH ── */
#auth{background:radial-gradient(ellipse at 50% -10%,#200030 0%,#06000e 65%)}
.acard{width:min(420px,94vw);background:rgba(12,4,26,.96);border:1px solid rgba(155,0,255,.2);border-radius:22px;padding:clamp(20px,5vw,36px) clamp(16px,5vw,30px);box-shadow:0 0 80px rgba(155,0,255,.1),0 30px 60px rgba(0,0,0,.75);backdrop-filter:blur(20px);max-height:92vh;overflow-y:auto}
.acard::-webkit-scrollbar{display:none}
.alo{font-family:var(--fd);font-size:clamp(.9rem,3vw,1.35rem);color:var(--gold);text-align:center;letter-spacing:2px;margin-bottom:3px;text-shadow:0 0 20px rgba(255,215,0,.3)}
.asu{text-align:center;color:rgba(255,255,255,.25);font-size:.72rem;margin-bottom:20px;letter-spacing:1px}
.atbs{display:flex;border-radius:12px;overflow:hidden;border:1px solid var(--brd);margin-bottom:20px}
.atb{flex:1;padding:12px;text-align:center;font-family:var(--ft);font-size:.72rem;letter-spacing:1px;cursor:pointer;background:transparent;border:none;color:#444;transition:.2s;min-height:44px}
.atb.on{background:rgba(155,0,255,.2);color:#fff}
.fg{margin-bottom:11px}
.fl{display:block;font-size:.64rem;letter-spacing:1.5px;color:#555;margin-bottom:5px;text-transform:uppercase}
.fi{width:100%;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:11px;padding:clamp(11px,3vw,14px) 14px;color:#fff;font-family:var(--fb);font-size:1rem;outline:none;transition:.2s;-webkit-appearance:none}
.fi:focus{border-color:rgba(155,0,255,.5);background:rgba(155,0,255,.06)}
.fi::placeholder{color:rgba(255,255,255,.15)}
.ferr{font-size:.67rem;color:#ff6060;margin-top:4px;display:none;padding-left:2px}
.abtn{width:100%;background:linear-gradient(135deg,#5500bb,#9b00ff);border:none;padding:clamp(12px,3.5vw,15px);border-radius:13px;color:#fff;font-family:var(--ft);font-weight:700;font-size:.86rem;letter-spacing:2px;cursor:pointer;margin-top:5px;transition:transform .14s,box-shadow .18s;box-shadow:0 8px 22px rgba(155,0,255,.28);text-transform:uppercase;min-height:50px}
.abtn:active{transform:scale(.97)}
.esnd{display:none;align-items:center;justify-content:center;gap:8px;padding:9px;font-size:.74rem;color:#00e676;margin-top:9px;background:rgba(0,200,100,.04);border:1px solid rgba(0,200,100,.12);border-radius:9px}
.espi{width:15px;height:15px;border:2px solid rgba(0,200,100,.18);border-top:2px solid #00e676;border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.adev{text-align:center;margin-top:14px;font-size:.58rem;color:#1a1a1a;letter-spacing:2px}
.redeem-row{display:flex;gap:8px;margin-top:12px}
.redeem-fi{flex:1;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,215,0,.15);border-radius:11px;padding:10px 12px;color:#fff;font-family:var(--fb);font-size:.9rem;outline:none;-webkit-appearance:none}
.redeem-fi::placeholder{color:rgba(255,255,255,.15)}
.redeem-btn{padding:10px 14px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.25);border-radius:11px;color:var(--gold);font-family:var(--ft);font-size:.7rem;cursor:pointer;white-space:nowrap;min-height:44px;transition:.14s}
.redeem-btn:active{background:rgba(255,215,0,.2)}

/* email modal */
.emb-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:800;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:.3s}
.emb-bg.on{opacity:1;pointer-events:auto}
.emb-m{width:min(450px,94vw);background:rgba(8,2,18,.98);border:1px solid rgba(0,200,100,.2);border-radius:18px;padding:22px 18px;max-height:86vh;overflow-y:auto}
.emb-m::-webkit-scrollbar{display:none}
.em-ic{font-size:2rem;text-align:center;display:block;margin-bottom:8px}
.em-ti{font-family:var(--ft);font-size:.93rem;color:#00e676;text-align:center;margin-bottom:3px;letter-spacing:1px}
.em-to{font-size:.68rem;color:#333;text-align:center;margin-bottom:12px}
.em-bd{background:rgba(0,180,80,.04);border:1px solid rgba(0,180,80,.1);border-radius:9px;padding:13px;font-size:.74rem;line-height:1.72;color:#aaa;white-space:pre-wrap;word-break:break-word}
.em-nt{font-size:.62rem;color:#252525;text-align:center;margin-top:9px;line-height:1.5;padding:0 4px}
.em-cl{width:100%;margin-top:10px;background:rgba(0,200,100,.08);border:1px solid rgba(0,200,100,.18);border-radius:10px;padding:11px;color:#00e676;font-family:var(--ft);font-size:.78rem;cursor:pointer;letter-spacing:1px;transition:.14s;min-height:46px}
.em-cl:active{background:rgba(0,200,100,.18)}
.em-gen{display:flex;align-items:center;gap:10px;color:#444;font-size:.76rem;padding:14px 0}

/* ── HOME ── */
#home{
  background:radial-gradient(ellipse at 30% -10%,rgba(155,0,255,.14) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 110%,rgba(232,32,32,.12) 0%,transparent 45%),
             radial-gradient(ellipse at 50% 50%,rgba(6,0,18,.98) 0%,#06000e 100%);
}
.hnav{width:100%;display:flex;justify-content:space-between;align-items:center;padding:calc(var(--st)+12px) 14px 12px;background:linear-gradient(to bottom,rgba(6,0,14,.92),transparent);position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.04)}
.hlft{display:flex;align-items:center;gap:8px;cursor:pointer;min-height:48px}
.hav{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#5500bb,var(--red));display:flex;align-items:center;justify-content:center;font-family:var(--ft);font-size:.95rem;border:2px solid rgba(255,255,255,.12);flex-shrink:0}
.hnm{font-size:.88rem;font-weight:600;color:#ddd;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hrgt{display:flex;gap:6px;align-items:center}
.dc-pill{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.55);border:1px solid rgba(255,215,0,.22);border-radius:18px;padding:5px 10px;font-family:var(--ft);font-size:.78rem;color:var(--gold)}
.nico{width:42px;height:42px;background:rgba(255,255,255,.04);border:1px solid var(--brd);border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;transition:.14s;position:relative}
.nico:active{background:rgba(255,255,255,.1);transform:scale(.93)}
.hbdy{width:100%;max-width:540px;margin:0 auto;padding:12px 14px 32px;display:flex;flex-direction:column;align-items:center;gap:14px}
.hban{text-align:center;width:100%;padding:6px 0}
.hban-ey{font-size:.66rem;letter-spacing:5px;color:rgba(255,60,60,.65);text-transform:uppercase;margin-bottom:6px}
.hban-t{font-family:var(--fd);font-size:clamp(2rem,9vw,4.2rem);margin:0;line-height:1;background:linear-gradient(160deg,#fff 10%,#cc0000 80%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 18px rgba(255,40,40,.2))}
.hban-sub{font-size:.65rem;letter-spacing:4px;color:rgba(255,215,0,.28);margin-top:5px;font-family:var(--ft)}
.wallet-card{width:100%;background:linear-gradient(135deg,rgba(255,215,0,.07),rgba(255,140,0,.03));border:1px solid rgba(255,215,0,.18);border-radius:18px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 24px rgba(255,215,0,.04)}
.wc-lbl{font-size:.6rem;letter-spacing:2px;color:rgba(255,215,0,.4);text-transform:uppercase;margin-bottom:4px;font-family:var(--ft)}
.wc-val{font-family:var(--ft);font-size:2rem;color:var(--gold);line-height:1;display:flex;align-items:center;gap:8px}
.wc-note{font-size:.62rem;color:#3a3a3a;margin-top:3px}
.idle-card{width:100%;background:linear-gradient(135deg,rgba(0,200,255,.06),rgba(80,0,200,.03));border:1px solid rgba(0,200,255,.18);border-radius:16px;padding:13px 16px;display:flex;align-items:center;gap:12px}
.idle-ico{font-size:1.9rem;flex-shrink:0;animation:zZ 3s ease-in-out infinite}
@keyframes zZ{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-3px) rotate(5deg)}}
.idle-mid{flex:1}
.idle-lbl{font-size:.58rem;letter-spacing:2px;color:rgba(0,200,255,.55);text-transform:uppercase;margin-bottom:3px;font-family:var(--ft)}
.idle-amt{font-family:var(--ft);font-size:1.4rem;color:var(--blue);line-height:1}
.idle-sub{font-size:.62rem;color:#555;margin-top:2px}
.idle-claim{padding:9px 13px;border-radius:10px;border:1px solid rgba(0,200,255,.3);background:rgba(0,200,255,.1);color:var(--blue);font-family:var(--ft);font-size:.7rem;font-weight:700;cursor:pointer;letter-spacing:1px;min-height:40px;white-space:nowrap;transition:.14s}
.idle-claim:active{transform:scale(.95);background:rgba(0,200,255,.22)}
.idle-claim.dis{opacity:.4;cursor:not-allowed}
.streak-card{width:100%;background:linear-gradient(135deg,rgba(255,90,0,.06),rgba(255,180,0,.03));border:1px solid rgba(255,140,0,.18);border-radius:16px;padding:13px 16px}
.streak-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.streak-ico{font-size:1.6rem}
.streak-tt{font-family:var(--ft);font-size:.8rem;color:var(--orange);letter-spacing:1px}
.streak-day{font-family:var(--ft);font-size:.62rem;color:#666;margin-top:2px}
.streak-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.sd{aspect-ratio:1;background:rgba(255,255,255,.02);border:1px solid var(--brd);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px}
.sd-num{font-size:.55rem;font-weight:700;color:#444}
.sd-rew{font-size:.8rem;margin-top:1px}
.sd.done{background:rgba(0,200,100,.07);border-color:rgba(0,200,100,.25)}
.sd.done .sd-num{color:#00e676}
.sd.today{background:linear-gradient(135deg,rgba(255,180,0,.18),rgba(255,90,0,.12));border-color:var(--orange);box-shadow:0 0 10px rgba(255,140,0,.25);animation:stpulse 1.5s infinite alternate}
@keyframes stpulse{from{box-shadow:0 0 5px rgba(255,140,0,.2)}to{box-shadow:0 0 14px rgba(255,140,0,.5)}}
.sd.today .sd-num{color:var(--gold)}
.streak-claim{width:100%;margin-top:9px;padding:10px;border-radius:10px;border:1px solid rgba(255,180,0,.35);background:linear-gradient(135deg,rgba(255,180,0,.13),rgba(255,90,0,.08));color:var(--gold);font-family:var(--ft);font-size:.76rem;font-weight:700;letter-spacing:1.5px;cursor:pointer;min-height:42px;transition:.14s}
.streak-claim:active{transform:scale(.97)}
.streak-claim.dis{opacity:.4;cursor:not-allowed}
.hstats-row{display:flex;gap:8px;width:100%}
.hsc{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:12px;padding:11px 8px;text-align:center}
.hscv{font-family:var(--ft);font-size:1.3rem;color:var(--gold);display:block;line-height:1}
.hscl{font-size:.54rem;color:rgba(255,255,255,.22);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;display:block}
.hplay{width:100%}
.btnp{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:340px;margin:0 auto;background:linear-gradient(135deg,#7a0000,#cc1010,#ff4422);border:none;padding:clamp(18px,4vw,22px);border-radius:60px;color:#fff;font-family:var(--ft);font-weight:900;font-size:clamp(1.05rem,4.5vw,1.5rem);letter-spacing:3px;cursor:pointer;box-shadow:0 14px 36px rgba(232,30,30,.55);transition:transform .14s,box-shadow .18s;text-transform:uppercase;min-height:62px;position:relative;overflow:hidden}
.btnp::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,.12),transparent);border-radius:inherit;pointer-events:none}
.btnp:active{transform:scale(.96)}
.hfrow{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;width:100%}
.hfeat{background:rgba(255,255,255,.04);border:1px solid var(--brd);border-radius:8px;padding:5px 10px;font-size:.66rem;color:#555;letter-spacing:.5px}
.hmyst{width:100%}
.shd{font-size:.58rem;letter-spacing:3px;color:rgba(255,255,255,.16);text-transform:uppercase;margin-bottom:8px;font-family:var(--ft)}
.mystg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.msc{background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:11px;padding:12px}
.mscv{font-family:var(--ft);font-size:1.45rem;color:var(--gold);line-height:1}
.mscl{font-size:.58rem;color:#3a3a3a;letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* ── DECK BUILDER ── */
#deck-builder{background:radial-gradient(ellipse at 50% -10%,rgba(0,200,100,.08) 0%,transparent 50%),#06000e;z-index:150}
.db-inner{width:min(580px,100%);margin:0 auto;padding:calc(var(--st)+10px) 14px calc(var(--sb)+40px)}
.db-hdr{display:flex;align-items:center;gap:12px;padding:14px 0 18px;position:sticky;top:0;background:#06000e;z-index:5;border-bottom:1px solid rgba(255,255,255,.04)}
.db-title{font-family:var(--ft);font-size:1.35rem;flex:1}
.db-info{font-size:.68rem;color:#555;text-align:right}
.db-note{background:rgba(0,200,100,.04);border:1px solid rgba(0,200,100,.12);border-radius:10px;padding:10px 14px;font-size:.7rem;color:rgba(0,200,100,.5);line-height:1.5;margin-bottom:14px;text-align:center}
.deck-slots{display:flex;gap:8px;justify-content:center;margin-bottom:16px;width:100%}
.deck-slot{width:52px;height:64px;background:rgba(255,255,255,.03);border:2px dashed rgba(255,255,255,.12);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;transition:.14s;position:relative;flex-shrink:0}
.deck-slot.filled{border-style:solid;border-color:rgba(255,215,0,.35);background:rgba(255,215,0,.06)}
.deck-slot.filled:active{transform:scale(.94)}
.deck-slot .ds-x{position:absolute;top:-5px;right:-5px;width:16px;height:16px;background:var(--red);border-radius:50%;border:1px solid #fff;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.roster-title{font-size:.62rem;letter-spacing:3px;color:#333;text-transform:uppercase;margin:14px 0 10px;font-family:var(--ft)}
.roster-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ru-card{background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:14px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.ru-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);pointer-events:none}
.ru-card:active{transform:scale(.93)}
.ru-card.in-deck{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.06);box-shadow:0 0 12px rgba(255,215,0,.12)}
.ru-emoji{font-size:1.8rem}
.ru-name{font-family:var(--ft);font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ru-trait{font-size:.5rem;color:#555;text-align:center;letter-spacing:.3px;text-transform:uppercase}
.ru-cost{font-size:.62rem;color:var(--gold);font-weight:700;display:flex;align-items:center;gap:2px}
.ru-cd{width:4px;height:4px;background:var(--gold);border-radius:50%}
.ru-tier{position:absolute;top:4px;right:4px;font-size:.48rem;font-weight:900;padding:2px 5px;border-radius:5px;letter-spacing:.5px;text-transform:uppercase}
.tier-common{background:rgba(150,150,150,.2);color:#999;border:1px solid rgba(150,150,150,.25)}
.tier-rare{background:rgba(0,150,255,.2);color:#4fc3f7;border:1px solid rgba(0,150,255,.25)}
.tier-epic{background:rgba(150,0,255,.2);color:#ce93d8;border:1px solid rgba(150,0,255,.25)}
.tier-legend{background:rgba(255,180,0,.2);color:var(--gold);border:1px solid rgba(255,180,0,.3)}
.evo-badge{position:absolute;bottom:4px;right:4px;font-size:.75rem}
.db-confirm{width:100%;padding:16px;border-radius:50px;background:linear-gradient(135deg,#005500,#00aa00);border:none;color:#fff;font-family:var(--ft);font-weight:900;font-size:1rem;cursor:pointer;letter-spacing:2px;box-shadow:0 10px 28px rgba(0,170,0,.32);min-height:56px;text-transform:uppercase;transition:.14s;margin-top:14px}
.db-confirm:active{transform:scale(.97)}

.rw-bossbonus{margin-top:6px;font-size:.68rem;color:var(--orange);background:rgba(255,140,0,.05);padding:5px 10px;border-radius:8px;display:inline-block}
.rw-earned{text-align:center;margin-bottom:18px}
.rw-coin-wrap{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:5px}
.rw-coin-ico{font-size:2.1rem;animation:coinSpin 1.5s ease-out}
@keyframes coinSpin{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.2) rotate(10deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
.rw-coin-amt{font-family:var(--fd);font-size:clamp(1.9rem,7vw,3rem);color:var(--gold);text-shadow:0 0 18px rgba(255,215,0,.35);animation:cntUp .8s ease-out}
@keyframes cntUp{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.rw-coin-lbl{font-size:.68rem;color:rgba(255,215,0,.35);letter-spacing:2px;text-transform:uppercase;font-family:var(--ft)}
.rw-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;width:min(380px,90vw);margin-bottom:20px}
.rw-st{background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:11px;padding:11px 5px;text-align:center}
.rw-stv{font-family:var(--ft);font-size:1.35rem;color:var(--gold)}
.rw-stl{font-size:.55rem;color:#2e2e2e;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.rw-btns{display:flex;flex-direction:column;align-items:center;gap:9px;width:100%}
.rw-btn-shop{display:flex;align-items:center;justify-content:center;gap:8px;width:min(270px,83vw);padding:14px;border-radius:50px;background:linear-gradient(135deg,rgba(255,180,0,.13),rgba(255,215,0,.07));border:1.5px solid rgba(255,215,0,.26);color:var(--gold);font-family:var(--ft);font-size:.9rem;cursor:pointer;letter-spacing:2px;transition:.14s;text-transform:uppercase;min-height:52px}
.rw-btn-shop:active{background:rgba(255,215,0,.14)}
.rw-btn-deck{display:flex;align-items:center;justify-content:center;gap:8px;width:min(270px,83vw);padding:14px;border-radius:50px;background:linear-gradient(135deg,rgba(0,200,100,.12),rgba(0,150,80,.06));border:1.5px solid rgba(0,200,100,.24);color:#00e676;font-family:var(--ft);font-size:.9rem;cursor:pointer;letter-spacing:2px;transition:.14s;text-transform:uppercase;min-height:52px}
.rw-btn-play{width:min(270px,83vw);padding:14px;border-radius:50px;background:linear-gradient(135deg,#7a0000,#e82020);border:none;color:#fff;font-family:var(--ft);font-weight:900;font-size:.9rem;cursor:pointer;letter-spacing:2px;transition:.14s;text-transform:uppercase;box-shadow:0 10px 26px rgba(232,30,30,.32);min-height:52px}
.rw-btn-play:active{transform:scale(.97)}
.rw-btn-home{background:transparent;border:1px solid var(--brd);padding:11px;border-radius:50px;color:#444;font-family:var(--ft);font-size:.75rem;cursor:pointer;letter-spacing:2px;transition:.14s;width:min(190px,66vw);min-height:44px}
.rw-btn-home:active{border-color:#888;color:#888}
.rw-dev{margin-top:16px;font-size:.55rem;color:#181818;letter-spacing:2px;text-align:center}

/* ── PAUSE ── */
#pov{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;opacity:0;pointer-events:none;transition:.3s}
#pov.on{opacity:1;pointer-events:auto}
.povt{font-family:var(--fd);font-size:1.9rem;color:#fff;margin-bottom:7px}
.povb{background:rgba(255,255,255,.05);border:1px solid var(--brd);padding:14px 0;border-radius:13px;color:#fff;font-family:var(--ft);font-size:.84rem;cursor:pointer;width:225px;text-align:center;transition:.14s;letter-spacing:2px;min-height:50px}
.povb:active{background:rgba(255,255,255,.12);transform:scale(.97)}

/* ── STREAK MODAL ── */
.streak-rew-bg{position:fixed;inset:0;background:rgba(0,0,0,.86);backdrop-filter:blur(10px);z-index:900;display:flex;align-items:center;justify-content:center;padding:18px;opacity:0;pointer-events:none;transition:.3s}
.streak-rew-bg.on{opacity:1;pointer-events:auto}
.streak-rew{width:min(360px,92vw);background:linear-gradient(135deg,rgba(20,5,30,.98),rgba(40,15,5,.96));border:1.5px solid rgba(255,180,0,.3);border-radius:20px;padding:26px 22px;text-align:center;box-shadow:0 0 50px rgba(255,140,0,.2)}
.sr-ico{font-size:3.2rem;animation:coinSpin 1.5s ease-out}
.sr-tt{font-family:var(--fd);font-size:1.3rem;color:var(--gold);margin:7px 0 3px;text-shadow:0 0 18px rgba(255,180,0,.45)}
.sr-sub{font-size:.72rem;color:#666;letter-spacing:1.5px;margin-bottom:16px;text-transform:uppercase}
.sr-rew{background:rgba(255,180,0,.07);border:1px solid rgba(255,180,0,.18);border-radius:13px;padding:14px;margin-bottom:16px}
.sr-rew-lbl{font-size:.63rem;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;font-family:var(--ft)}
.sr-rew-val{font-family:var(--fd);font-size:2rem;color:var(--gold);text-shadow:0 0 18px rgba(255,215,0,.4)}
.sr-streak-info{font-size:.72rem;color:#aaa;margin-bottom:16px}
.sr-streak-info span{color:var(--orange);font-weight:700}
.sr-cl{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,#7a0000,#e82020);border:none;color:#fff;font-family:var(--ft);font-weight:900;font-size:.88rem;letter-spacing:2px;cursor:pointer;min-height:50px}
.sr-cl:active{transform:scale(.97)}

/* ── MID-EXIT SAVE BANNER ── */
.save-banner{position:fixed;bottom:calc(var(--sb)+20px);left:50%;transform:translateX(-50%);background:rgba(0,200,100,.12);border:1px solid rgba(0,200,100,.3);border-radius:12px;padding:10px 20px;font-size:.78rem;color:#00e676;z-index:2001;display:none;align-items:center;gap:8px;font-family:var(--fb);font-weight:600;backdrop-filter:blur(10px);animation:savePop .4s ease}
.save-banner.show{display:flex}
@keyframes savePop{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}

/* ── FX ── */
.cpop{position:absolute;top:36%;left:50%;pointer-events:none;z-index:18;font-family:var(--ft);font-weight:900;color:var(--gold);text-shadow:0 0 28px rgba(255,215,0,.6);text-align:center;animation:cpA .55s cubic-bezier(.17,.67,.35,1.3) forwards}
@keyframes cpA{0%{transform:translate(-50%,-50%) scale(.1);opacity:0}55%{transform:translate(-50%,-50%) scale(1.06);opacity:1}100%{transform:translate(-50%,-50%) scale(1) translateY(-18px);opacity:0}}
.ftx{position:absolute;font-weight:800;font-family:var(--ft);pointer-events:none;text-shadow:0 2px 4px #000;z-index:20;animation:ftxU .85s ease-out forwards}
@keyframes ftxU{0%{transform:translateY(0) scale(.8);opacity:1}50%{transform:translateY(-26px) scale(1.1);opacity:1}100%{transform:translateY(-55px);opacity:0}}
.lvlp{position:absolute;font-family:var(--ft);font-size:1rem;font-weight:700;color:var(--gold);text-shadow:0 0 10px orange;animation:lvlA .9s ease-out forwards;pointer-events:none;z-index:50;white-space:nowrap}
@keyframes lvlA{0%{transform:scale(0);opacity:0}50%{transform:scale(1.3);opacity:1}100%{transform:scale(1) translateY(-55px);opacity:0}}
.evopop{position:absolute;font-family:var(--fd);font-size:.95rem;font-weight:700;color:#ce93d8;text-shadow:0 0 14px rgba(155,0,255,.8);animation:evAn 1.2s ease-out forwards;pointer-events:none;z-index:52;white-space:nowrap}
@keyframes evAn{0%{transform:scale(0) rotate(-10deg);opacity:0}50%{transform:scale(1.2) rotate(3deg);opacity:1}100%{transform:scale(1) translateY(-70px) rotate(0);opacity:0}}
.shake{animation:shk .38s cubic-bezier(.36,.07,.19,.97) both}
@keyframes shk{10%,90%{transform:translate3d(-1px,0,0)}30%,70%{transform:translate3d(-5px,0,0)}50%{transform:translate3d(5px,0,0)}}
.toast{position:fixed;top:calc(var(--st)+62px);left:50%;transform:translateX(-50%);background:rgba(14,6,28,.96);border:1px solid rgba(255,215,0,.16);border-radius:12px;padding:9px 18px;font-size:.78rem;z-index:2000;animation:tIn .28s ease,tOut .28s ease 2.7s forwards;pointer-events:none;backdrop-filter:blur(12px);white-space:nowrap;max-width:86vw;overflow:hidden;text-overflow:ellipsis;font-family:var(--fb);font-weight:600}
@keyframes tIn{from{opacity:0;transform:translate(-50%,-12px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes tOut{to{opacity:0;transform:translate(-50%,-12px)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
</style>
